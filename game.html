<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turjo Chess | Professional Edition</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #021526;
      --card-bg: #032030;
      --accent: #00d2ff;
      --board-light: #2c5d7d;
      --board-dark: #112e42;
      --global-clr: #00d2ff;
      --btn-clr: #ff499e;
      --second-dark-clr: #032030;
    }

    body {
      background-color: var(--bg-dark);
      color: white;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 15px;
      box-sizing: border-box;
      overflow-x: hidden;
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      width: 100%;
      max-width: 1200px;
    }

    @media (min-width: 992px) {
      .game-container {
        flex-direction: row;
        justify-content: center;
        align-items: flex-start;
      }
    }

    .profile-card,
    .board-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      background: #edeee4;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .profile-card {
      width: 300px;
      padding: 40px 15px;
      flex-direction: column;
      text-align: center;
    }

    .board-wrapper {
      width: 100%;
      max-width: 500px;
      aspect-ratio: 1 / 1;
    }

    .profile-card::before,
    .board-wrapper::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, var(--global-clr), var(--btn-clr), var(--global-clr), transparent);
      animation: rotateLight 2s linear infinite;
      z-index: 0;
    }

    .profile-card::after,
    .board-wrapper::after {
      content: '';
      position: absolute;
      inset: 4px;
      background: var(--second-dark-clr);
      border-radius: 16px;
      z-index: 1;
    }

    .profile-card>*,
    .board-wrapper>* {
      position: relative;
      z-index: 2;
    }

    @keyframes rotateLight {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .profile-card img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      border: 4px solid var(--btn-clr);
      object-fit: cover;
      margin-bottom: 15px;
    }

    .elo-badge {
      background: var(--accent);
      color: black;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    /* Timers */
    #player-timer,
    #opponent-timer {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.8rem;
      font-weight: bold;
      transition: all 0.1s ease;
      background-color: white;
      padding: 5px;
      border-radius: 8px;
      margin-top: 10px;
    }

    #opponent-timer {
      color: var(--accent);
      margin-bottom: 10px;
    }

    #player-timer {
      color: var(--btn-clr);
      margin-bottom: 10px;
      width: fit-content;
      '
 margin-left: 50%;
      margin-right: 50%;
    }

    .active-timer {
      color: var(--btn-clr) !important;
      text-shadow: 0 0 10px var(--btn-clr);
      transform: scale(1.1);
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: 100%;
      height: 100%;
    }

    .square {
      position: relative;
      /* Add this! */
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: clamp(20px, 5vw, 36px);
      cursor: pointer;
    }

    .light {
      background-color: var(--board-light);
    }

    .dark {
      background-color: var(--board-dark);
    }

    .selected {
      background-color: rgba(0, 210, 255, 0.4) !important;
    }

    /* Winning/Losing Highlight */
    .losing-king {
      background-color: #ff499e !important;
      box-shadow: inset 0 0 20px rgba(255, 73, 158, 0.8);
      border: 2px solid white;
    }

    .white-piece {
      color: #fff;
      filter: drop-shadow(0 0 2px var(--bg-dark));
    }

    .black-piece {
      color: black;
      filter: drop-shadow(0 0 5px var(--accent));
    }

    .controls {
      margin-top: 20px;
      text-align: center;
      width: 100%;
    }

    .btn {
      background: var(--accent);
      border: none;
      padding: 10px 25px;
      border-radius: 6px;
      cursor: pointer;
      font-weight: bold;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid var(--accent);
      color: white;
      padding: 10px 25px;
      border-radius: 6px;
      cursor: pointer;
    }

    #chat {
      transition: opacity 0.3s ease;
      min-height: 3em;
      font-style: italic;
      color: var(--accent);
    }

    .home-btn {
      align-self: flex-start;
      margin-bottom: 20px;
      background: var(--card-bg);
      color: white;
      text-decoration: none;
      font-size: 0.9rem;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      border-radius: 12px;
      border: 1px solid rgba(0, 210, 255, 0.3);
      transition: all 0.3s ease;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    }

    .home-btn:hover {
      background: var(--accent);
      color: #000;
      transform: translateX(-5px);
      border-color: var(--accent);
    }

    .h3-text {
      margin: 10px 0 5px;
      font-size: 2.0rem;
      padding: 5px;
      color: white;
      background-color: #ff499e;
      border-radius: 10px;
    }

    /* Last Move Highlighting */
    .last-move-prev {
      background-color: rgba(37, 231, 37, 0.527) !important;
      /* Light Green for old square */
    }

    .last-move-now {
      background-color: rgba(25, 199, 199, 0.993) !important;
      /* Deeper Green for new square */
    }

    /* Legal Move Dots */
    /* Regular move dot */
    .legal-dot {
      width: 15px;
      height: 15px;
      background-color: rgba(11, 223, 64, 0.712);
      border-radius: 50%;
      pointer-events: none;
      z-index: 5;
    }

    /* Capture square highlight (Red Square) */
    .capture-highlight {
      /* background-color: rgba(255, 73, 158, 0.349) !important; */
      /* Your pink/red theme color */
      box-shadow: inset 0 0 15px rgba(255, 73, 158, 0.8);
      border: 3px solid var(--btn-clr);
      border-radius: 4px;
      pointer-events: none;
      z-index: 4;
    }

    .dark .legal-dot {
      background-color: rgba(11, 223, 64, 0.712);
    }
  </style>
</head>

<body>

  <a href="index.html" class="home-btn">
    <i class="fa-solid fa-arrow-left"></i> Back to Home
  </a>

  <div class="game-container">
    <div class="profile-card">
      <img src="./images/myselfcartoon.jpeg" alt="Turjo">
      <div class="elo-badge">ELO 1600</div>
      <h3 class="h3-text"><i class="fa-solid fa-robot"></i> Turjo AI</h3>
      <div id="opponent-timer">10:00</div>
      <p id="chat">"Are you ready to lose?"</p>
    </div>

    <div style="flex-grow: 1; max-width: 500px; width: 100%;">
      <div class="board-wrapper">
        <div id="chessboard" class="board"></div>
      </div>

      <div class="controls">
        <div id="player-timer">10:00</div>
        <div id="status" style="margin-bottom: 15px; font-weight: bold;">Your Turn (White)</div>
        <div style="display: flex; gap: 10px; justify-content: center;">
          <button class="btn" onclick="initGame()">Start Game</button>
          <button class="btn-outline" onclick="undoMove()">Undo</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="chess-timer.js"></script>
  <script src="turjo-chat.js"></script>

  <script>
    let game = new Chess();
    const boardElement = document.getElementById('chessboard');
    const statusElement = document.getElementById('status');
    let selectedSquare = null;
    let gameStarted = false; // Flag for manual start

    const engineWorker = new Worker('chess-worker.js');

    const pieceIcons = {
      p: 'fa-chess-pawn', r: 'fa-chess-rook', n: 'fa-chess-knight',
      b: 'fa-chess-bishop', q: 'fa-chess-queen', k: 'fa-chess-king'
    };

    /** * Renders the board and pieces 
     */
    function drawBoard() {
      boardElement.innerHTML = '';
      const boardState = game.board();

      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const squareDiv = document.createElement('div');
          const squareName = String.fromCharCode(97 + c) + (8 - r);
          squareDiv.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;

          // Keep the selection highlight if this square is active
          if (selectedSquare === squareName) squareDiv.classList.add('selected');

          const piece = boardState[r][c];
          if (piece) {
            const icon = document.createElement('i');
            icon.className = `fa-solid ${pieceIcons[piece.type]} ${piece.color === 'w' ? 'white-piece' : 'black-piece'}`;
            squareDiv.appendChild(icon);
          }

          squareDiv.onclick = () => handleSquareClick(squareName);
          boardElement.appendChild(squareDiv);
        }
      }
    }

    /** * Highlights legal moves with dots (empty) or red glow (capture)
     */
    function showLegalMoves(square) {
      const moves = game.moves({ square: square, verbose: true });
      const squares = document.querySelectorAll('.square');

      moves.forEach(m => {
        const toIdx = (8 - parseInt(m.to[1])) * 8 + (m.to.charCodeAt(0) - 97);
        const targetSquare = squares[toIdx];
        const pieceOnTarget = game.get(m.to);

        if (pieceOnTarget) {
          // Capture Highlight: Red Glow
          const captureBox = document.createElement('div');
          captureBox.className = 'capture-highlight';
          captureBox.style.position = 'absolute';
          captureBox.style.width = '100%';
          captureBox.style.height = '100%';
          targetSquare.appendChild(captureBox);
        } else {
          // Standard Move: Small Dot
          const dot = document.createElement('div');
          dot.className = 'legal-dot';
          targetSquare.appendChild(dot);
        }
      });
    }

    /** * Highlights the green path of the last move 
     */
    function highlightLastMove(from, to) {
      const squares = document.querySelectorAll('.square');
      const fromIdx = (8 - parseInt(from[1])) * 8 + (from.charCodeAt(0) - 97);
      const toIdx = (8 - parseInt(to[1])) * 8 + (to.charCodeAt(0) - 97);

      // Use timeout to ensure board is drawn before applying classes
      setTimeout(() => {
        squares[fromIdx].classList.add('last-move-prev');
        squares[toIdx].classList.add('last-move-now');
      }, 10);
    }

    /** * Handles user clicks on the board
     */
    function handleSquareClick(square) {
      if (!gameStarted) {
        statusElement.innerText = "Please click 'Start Game' to begin!";
        statusElement.style.color = "var(--btn-clr)";
        return;
      }

      if (game.turn() === 'b' || game.game_over()) return;

      if (selectedSquare === square) {
        selectedSquare = null;
        drawBoard();
      } else {
        const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });

        if (move) {
          selectedSquare = null;
          drawBoard();
          highlightLastMove(move.from, move.to);

          if (window.addIncrement) window.addIncrement('w');

          // Check if user won BEFORE bot thinks
          if (!window.checkWinCondition(game)) {
            statusElement.innerText = "Turjo is thinking...";
            engineWorker.postMessage({ fen: game.fen() });
          }
        } else {
          const piece = game.get(square);
          if (piece && piece.color === 'w') {
            selectedSquare = square;
            drawBoard(); // Clear previous highlights/dots

            // Highlight current selection
            const idx = (8 - parseInt(square[1])) * 8 + (square.charCodeAt(0) - 97);
            document.querySelectorAll('.square')[idx].classList.add('selected');

            showLegalMoves(square);
          }
        }
      }
    }

    /** * Handles AI moves coming from the worker
     */
    engineWorker.onmessage = function (e) {
      const move = game.move(e.data);
      drawBoard();
      updateGameStatus();

      if (move) {
        highlightLastMove(move.from, move.to);
        if (window.addIncrement) window.addIncrement('b');
      }

      if (window.updateTurjoChat) {
        window.updateTurjoChat(game, move);
      }

      window.checkWinCondition(game);
    };

    function updateGameStatus() {
      if (game.in_checkmate()) {
        statusElement.innerText = "Checkmate! Game Over.";
      } else if (game.in_draw()) {
        statusElement.innerText = "Draw!";
      } else {
        statusElement.innerText = "Your Turn (White)";
      }
    }

    function undoMove() {
      if (!gameStarted) return;
      game.undo(); game.undo();
      selectedSquare = null;
      drawBoard();
      statusElement.innerText = "Your Turn (White)";

      if (window.updateTurjoChat) {
        window.updateTurjoChat(game, null, true);
      }
    }

    /** * Starts/Resets the full game logic
     */
    function initGame() {
      game = new Chess();
      selectedSquare = null;
      gameStarted = true;
      statusElement.style.color = "white";

      drawBoard();
      updateGameStatus();

      if (window.resetChessTimer && window.startChessTimer) {
        window.resetChessTimer();
        window.startChessTimer(game);
      }
    }

    // Initial board setup on page load (manual start mode)
    drawBoard();
  </script>

</body>

</html>
