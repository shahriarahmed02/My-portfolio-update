<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Turjo Chess | Turjo.codes </title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --bg-dark: #021526;
      --card-bg: #032030;
      --accent: #00d2ff;
      --board-light: #2c5d7d;
      --board-dark: #112e42;
      --global-clr: #00d2ff;
      --btn-clr: #ff499e;
      --second-dark-clr: #032030;
    }

    body {
      background-color: var(--bg-dark);
      color: white;
      font-family: 'Poppins', sans-serif;
      margin: 0;
      min-height: 100vh;
      overflow-x: hidden;
    }

    .neon-text {
      color: var(--accent);
      text-shadow: 0 0 10px rgba(0, 210, 255, 0.5);
    }

    .game-container {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 25px;
      width: 100%;
      max-width: 1200px;
      margin: 40px auto;
      padding: 0 20px;
    }

    @media (min-width: 992px) {
      .game-container {
        flex-direction: row;
        justify-content: center;
        align-items: flex-start;
      }
    }

    .profile-card,
    .board-wrapper {
      position: relative;
      overflow: hidden;
      border-radius: 20px;
      background: #edeee4;
      display: flex;
      justify-content: center;
      align-items: center;
      flex-shrink: 0;
    }

    .profile-card {
      width: 300px;
      padding: 40px 15px;
      flex-direction: column;
      text-align: center;
    }

    .board-wrapper {
      width: 100%;
      max-width: 500px;
      aspect-ratio: 1 / 1;
    }

    .profile-card::before,
    .board-wrapper::before {
      content: '';
      position: absolute;
      width: 200%;
      height: 200%;
      background: conic-gradient(from 0deg, transparent, var(--global-clr), var(--btn-clr), var(--global-clr), transparent);
      animation: rotateLight 3s linear infinite;
      z-index: 0;
    }

    .profile-card::after,
    .board-wrapper::after {
      content: '';
      position: absolute;
      inset: 4px;
      background: var(--second-dark-clr);
      border-radius: 16px;
      z-index: 1;
    }

    .profile-card>*,
    .board-wrapper>* {
      position: relative;
      z-index: 2;
    }

    @keyframes rotateLight {
      from {
        transform: rotate(0deg);
      }

      to {
        transform: rotate(360deg);
      }
    }

    .profile-card img {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      border: 4px solid var(--btn-clr);
      object-fit: cover;
      margin-bottom: 15px;
    }

    .elo-badge {
      background: var(--accent);
      color: black;
      font-weight: bold;
      padding: 4px 12px;
      border-radius: 8px;
      margin-bottom: 8px;
    }

    #player-timer,
    #opponent-timer {
      font-family: 'Courier New', Courier, monospace;
      font-size: 1.8rem;
      font-weight: bold;
      background-color: white;
      padding: 8px 20px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
    }

    #opponent-timer {
      color: var(--accent);
      margin-bottom: 15px;
    }

    #player-timer {
      color: var(--btn-clr);
      margin: 15px auto;
      display: inline-block;
    }

    .board {
      display: grid;
      grid-template-columns: repeat(8, 1fr);
      grid-template-rows: repeat(8, 1fr);
      width: 100%;
      height: 100%;
    }

    .square {
      position: relative;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: clamp(24px, 6vw, 40px);
      cursor: pointer;
      transition: background 0.2s;
    }

    .light {
      background-color: var(--board-light);
    }

    .dark {
      background-color: var(--board-dark);
    }

    .selected {
      background-color: rgba(0, 210, 255, 0.5) !important;
    }

    .white-piece {
      color: #fff;
      filter: drop-shadow(0 0 2px #000);
    }

    .black-piece {
      color: #000;
      filter: drop-shadow(0 0 5px var(--accent));
    }

    .btn {
      background: var(--accent);
      border: none;
      padding: 12px 30px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn-outline {
      background: transparent;
      border: 2px solid var(--accent);
      color: white;
      padding: 10px 30px;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.3s;
    }

    .h3-text {
      margin: 10px 0;
      font-size: 1.6rem;
      padding: 8px 15px;
      color: white;
      background-color: var(--btn-clr);
      border-radius: 10px;
    }

    .last-move-prev {
      background-color: rgba(37, 231, 37, 0.4) !important;
    }

    .last-move-now {
      background-color: rgba(25, 199, 199, 0.7) !important;
    }

    .legal-dot {
      width: 16px;
      height: 16px;
      background: rgba(11, 223, 64, 0.8);
      border-radius: 50%;
      pointer-events: none;
    }

    .capture-highlight {
      box-shadow: inset 0 0 15px var(--btn-clr);
      border: 3px solid var(--btn-clr);
      width: 100%;
      height: 100%;
      position: absolute;
      border-radius: 4px;
    }

    /* Added for the losing king effect */
    .losing-king {
      background-color: #ff499e !important;
      animation: pulse 1s infinite alternate;
    }

    @keyframes pulse {
      from {
        opacity: 1;
      }

      to {
        opacity: 0.6;
      }
    }
  </style>
</head>

<body>

  <nav class="sticky top-0 z-[100] bg-[#021526]/80 backdrop-blur-md border-b border-white/10 px-6 py-4">
    <div class="max-w-7xl mx-auto flex justify-between items-center">
      <a href="index.html" class="font-extrabold text-xl flex items-center">
        <span class="text-white">Turjo</span><span class="neon-text">.dev</span>
      </a>
      <div class="hidden md:flex items-center gap-8 text-gray-300">
        <a href="index.html" class="hover:text-[#00d2ff] transition-colors">Home</a>
        <a href="project.html" class="hover:text-[#00d2ff] transition-colors">Projects</a>
        <a href="game.html" class="text-[#00d2ff] flex items-center gap-2"><i class="fa-solid fa-gamepad"></i> Play</a>
        <a href="skills.html" class="hover:text-[#00d2ff] transition-colors">Skills</a>
        <a href="contact.html" class="hover:text-[#00d2ff] transition-colors">Contact</a>
      </div>
      <button id="menu-btn" class="md:hidden text-2xl text-white"><i class="fa-solid fa-bars"></i></button>
    </div>
  </nav>

  <div class="game-container">
    <div class="profile-card">
      <img src="./images/myselfcartoon.jpeg" alt="Turjo">
      <div class="elo-badge">ELO 600</div>
      <h3 class="h3-text"><i class="fa-solid fa-robot"></i> Turjo AI</h3>
      <div id="opponent-timer">10:00</div>
      <p id="chat">"Are you ready to lose?"</p>
    </div>

    <div style="flex-grow: 1; max-width: 500px; width: 100%;">
      <div class="board-wrapper">
        <div id="chessboard" class="board"></div>
      </div>

      <div class="text-center mt-6">
        <div id="player-timer">10:00</div>
        <div id="status" class="mb-4 font-bold text-lg">Click 'Start Game' to Begin</div>
        <div class="flex gap-4 justify-center">
          <button class="btn" onclick="initGame()">Start Game</button>
          <button class="btn-outline" onclick="undoMove()">Undo</button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/chess.js/0.10.3/chess.min.js"></script>
  <script src="chess-timer.js"></script>
  <script src="turjo-chat.js"></script>

  <script>
    /* --- NAVIGATION LOGIC --- */
    const menuBtn = document.getElementById('menu-btn');
    const mobileMenu = document.createElement('div');
    mobileMenu.className = "hidden flex-col bg-[#032030] fixed top-[72px] left-0 w-full p-6 gap-4 z-[999] border-b border-[#00d2ff]/30 shadow-2xl";
    mobileMenu.innerHTML = `
      <a href="index.html" class="text-lg py-3 border-b border-white/5">Home</a>
      <a href="project.html" class="text-lg py-3 border-b border-white/5">Projects</a>
      <a href="game.html" class="text-lg py-3 text-[#00d2ff] font-bold">Play</a>
      <a href="skills.html" class="text-lg py-3 border-b border-white/5">Skills</a>
      <a href="contact.html" class="text-lg py-3">Contact</a>
    `;
    document.body.appendChild(mobileMenu);

    menuBtn.addEventListener('click', () => {
      mobileMenu.classList.toggle('hidden');
      mobileMenu.classList.toggle('flex');
    });

    /* --- CHESS GAME LOGIC --- */
    let game = new Chess();
    const boardElement = document.getElementById('chessboard');
    const statusElement = document.getElementById('status');
    let selectedSquare = null;
    let gameStarted = false;
    const engineWorker = new Worker('chess-worker.js');
    const pieceIcons = { p: 'fa-chess-pawn', r: 'fa-chess-rook', n: 'fa-chess-knight', b: 'fa-chess-bishop', q: 'fa-chess-queen', k: 'fa-chess-king' };

    function drawBoard() {
      boardElement.innerHTML = '';
      const boardState = game.board();
      for (let r = 0; r < 8; r++) {
        for (let c = 0; c < 8; c++) {
          const squareDiv = document.createElement('div');
          const squareName = String.fromCharCode(97 + c) + (8 - r);
          squareDiv.className = `square ${(r + c) % 2 === 0 ? 'light' : 'dark'}`;
          if (selectedSquare === squareName) squareDiv.classList.add('selected');
          const piece = boardState[r][c];
          if (piece) {
            const icon = document.createElement('i');
            icon.className = `fa-solid ${pieceIcons[piece.type]} ${piece.color === 'w' ? 'white-piece' : 'black-piece'}`;
            squareDiv.appendChild(icon);
          }
          squareDiv.onclick = () => handleSquareClick(squareName);
          boardElement.appendChild(squareDiv);
        }
      }
    }

    function showLegalMoves(square) {
      const moves = game.moves({ square: square, verbose: true });
      const squares = document.querySelectorAll('.square');
      moves.forEach(m => {
        const toIdx = (8 - parseInt(m.to[1])) * 8 + (m.to.charCodeAt(0) - 97);
        const targetSquare = squares[toIdx];
        if (game.get(m.to)) {
          const captureBox = document.createElement('div');
          captureBox.className = 'capture-highlight';
          targetSquare.appendChild(captureBox);
        } else {
          const dot = document.createElement('div');
          dot.className = 'legal-dot';
          targetSquare.appendChild(dot);
        }
      });
    }

    function highlightLastMove(from, to) {
      const squares = document.querySelectorAll('.square');
      const fromIdx = (8 - parseInt(from[1])) * 8 + (from.charCodeAt(0) - 97);
      const toIdx = (8 - parseInt(to[1])) * 8 + (to.charCodeAt(0) - 97);
      squares.forEach(s => s.classList.remove('last-move-prev', 'last-move-now'));
      setTimeout(() => {
        squares[fromIdx].classList.add('last-move-prev');
        squares[toIdx].classList.add('last-move-now');
      }, 10);
    }

    function handleBotTurnEnd() {
      if (game.game_over()) return;
      engineWorker.postMessage({ fen: game.fen(), mode: 'ponder' });
    }

    function triggerBotMove() {
      statusElement.innerText = "Turjo is calculating...";
      engineWorker.postMessage({ fen: game.fen(), mode: 'search', timeLimit: 3000 });
    }

    function handleSquareClick(square) {
      if (!gameStarted || game.turn() === 'b' || game.game_over()) return;
      if (selectedSquare === square) {
        selectedSquare = null;
        drawBoard();
      } else {
        const move = game.move({ from: selectedSquare, to: square, promotion: 'q' });
        if (move) {
          selectedSquare = null;
          drawBoard();
          highlightLastMove(move.from, move.to);
          if (window.addIncrement) window.addIncrement('w');
          if (!window.checkWinCondition(game)) triggerBotMove();
        } else {
          const piece = game.get(square);
          if (piece && piece.color === 'w') {
            selectedSquare = square;
            drawBoard();
            const idx = (8 - parseInt(square[1])) * 8 + (square.charCodeAt(0) - 97);
            document.querySelectorAll('.square')[idx].classList.add('selected');
            showLegalMoves(square);
          }
        }
      }
    }

    engineWorker.onmessage = function (e) {
      const move = game.move(e.data);
      drawBoard();
      updateGameStatus();
      if (move) {
        highlightLastMove(move.from, move.to);
        if (window.addIncrement) window.addIncrement('b');
      }
      if (window.updateTurjoChat) window.updateTurjoChat(game, move);
      window.checkWinCondition(game);
      handleBotTurnEnd();
    };

    function updateGameStatus() {
      if (game.in_checkmate()) statusElement.innerText = "Checkmate! Game Over.";
      else if (game.in_draw()) statusElement.innerText = "Draw!";
      else statusElement.innerText = "Your Turn (White)";
    }

    function undoMove() {
      if (!gameStarted) return;
      game.undo(); game.undo();
      selectedSquare = null;
      drawBoard();
      statusElement.innerText = "Your Turn (White)";
      handleBotTurnEnd();
    }

    function initGame() {
      game = new Chess();
      selectedSquare = null;
      gameStarted = true;
      drawBoard();
      updateGameStatus();
      if (window.resetChessTimer && window.startChessTimer) {
        window.resetChessTimer();
        window.startChessTimer(game);
      }
      engineWorker.postMessage({ fen: game.fen(), mode: 'ponder' });
    }

    drawBoard();
  </script>
</body>

</html>
